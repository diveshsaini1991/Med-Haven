name: Backend Tests

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  check-changes:
    runs-on: ubuntu-latest
    outputs:
      backend_changed: ${{ steps.filter.outputs.backend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'

  test:
    needs: check-changes
    if: needs.check-changes.outputs.backend_changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
        working-directory: backend
      - name: Run tests
        id: run-tests
        working-directory: backend
        run: |
          npm test -- --reporter=verbose 2>&1 | tee test-output.txt
          echo "exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT
      - name: Upload test output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-output
          path: backend/test-output.txt

  backend-test-result:
    runs-on: ubuntu-latest
    needs: [check-changes, test]
    if: always()
    steps:
      - name: Download test output
        if: needs.test.result == 'failure'
        uses: actions/download-artifact@v4
        with:
          name: test-output
        continue-on-error: true

      - name: Comment on PR - Tests Passed
        if: needs.test.result == 'success'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `✅ **Backend Tests Passed**\n\nAll backend tests passed. Looks good to be merged!`
            });

      - name: Comment on PR - Tests Failed
        if: needs.test.result == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let failedTests = '';
            try {
              const output = fs.readFileSync('test-output.txt', 'utf8');
              const failLines = output.split('\n').filter(l => l.includes('FAIL') || l.includes('×') || l.includes('AssertionError'));
              failedTests = failLines.slice(0, 20).join('\n');
            } catch(e) {
              failedTests = 'Could not read test output.';
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `❌ **Backend Tests Failed**\n\nThe following tests failed:\n\n\`\`\`\n${failedTests}\n\`\`\`\n\n---\n\n**To run tests locally:**\n\`\`\`bash\ncd backend\nnvm use 20   # requires Node 18-24\nnpm install\nnpm test\n\`\`\`\n\nPlease fix the failing tests before merging.`
            });

      - name: Comment on PR - Tests Skipped
        if: needs.check-changes.outputs.backend_changed != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `⏭️ **Backend Tests Skipped**\n\nNo changes detected in \`backend/\` — backend tests were not run.`
            });

      - name: Fail if tests failed
        if: needs.test.result == 'failure'
        run: exit 1
